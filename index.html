<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOVE | Steam</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
.banner{
    width:100%;
    border-radius:22px;
    margin-bottom:35px;
    transition:0.35s ease;
    box-shadow:0 0 20px rgba(0,120,255,.18);
}

.banner:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 0 35px rgba(0,120,255,.55);
}

.section-title{
    color:#ffffff;
    font-size:24px;
    font-weight:bold;
    margin:25px 0 15px;
}

.footer{
    margin-top:40px;
    color:#8ea2c8;
    font-size:15px;
}

.footer span{
    color:#2d8cff;
    font-weight:bold;
}

body{
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:900px;
text-align:center;
}

.logo{
color:#fff;
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
color:#9ca3af;
margin-bottom:40px;
font-size:18px;
}

.card{
display:block;
text-decoration:none;
background:#111827;
color:#fff;
padding:22px;
margin:18px 0;
border-radius:18px;
border:1px solid #2563eb;
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
background:#1e293b;
}

.card h2{
font-size:28px;
margin-bottom:8px;
}

.card p{
color:#cbd5e1;
font-size:15px;
}
</style>

</head>

<body>

<div class="container">

<div class="logo">MOVE</div>

<div class="desc">
اختر نوع حساب Steam
</div>

<div class="section-title">
🎮 Steam Online
</div>

<a href="https://salla.sa/movestore/steam-online/c25323818" target="_blank">
    <img src="online.png" class="banner">
</a>

<div class="section-title">
💿 Steam Offline
</div>

<a href="https://salla.sa/movestore/steam-offline/c758486836" target="_blank">
    <img src="offline.png" class="banner">
</a>

<div class="footer">
© 2026 <span>MOVE STORE</span><br>
أفضل متجر للحسابات والألعاب الرقمية
</div>

</div>

</body>
</html>
