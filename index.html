<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOVE | Steam</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(180deg,#050913,#091321,#0b1220);

color:#fff;

display:flex;
justify-content:center;

padding:60px 20px;

overflow-x:hidden;

position:relative;

}

/* الخلفية */

.background{

position:fixed;
inset:0;

pointer-events:none;

z-index:0;

background:

radial-gradient(circle at 20% 30%,rgba(0,140,255,.15),transparent 30%),

radial-gradient(circle at 80% 30%,rgba(0,140,255,.15),transparent 30%),

radial-gradient(circle at center,rgba(0,80,255,.08),transparent 55%);

animation:bgMove 12s ease-in-out infinite;

}

@keyframes bgMove{

0%,100%{
transform:scale(1);
}

50%{
transform:scale(1.04);
}

}

/* النجوم */

.particles{

position:fixed;

inset:0;

pointer-events:none;

z-index:0;

opacity:.35;

background-image:

radial-gradient(#1d8cff 1px,transparent 1px),

radial-gradient(#4db8ff 1px,transparent 1px);

background-size:180px 180px,260px 260px;

background-position:0 0,120px 80px;

animation:particlesMove 18s linear infinite;

}

@keyframes particlesMove{

from{
transform:translateY(0);
}

to{
transform:translateY(-180px);
}

}

/* الشخصيات */

.side{

position:fixed;

pointer-events:none;

opacity:.55;

z-index:1;

filter:

drop-shadow(0 0 35px #008cff)

drop-shadow(0 0 90px rgba(0,140,255,.55));

}

.left-character{

left:-180px;

bottom:-60px;

height:100vh;

width:auto;

}

.right-character{

right:-20px;

bottom:-450px;

height:135vh;

width:auto;

}

/* المحتوى */

.container{

position:relative;

z-index:5;

width:100%;

max-width:900px;

text-align:center;

}
    /* اللوقو */

.logo{
margin-bottom:20px;
}

.logo img{

width:120px;
height:120px;

border-radius:50%;

display:block;

margin:auto;

box-shadow:

0 0 18px rgba(45,140,255,.35),

0 0 40px rgba(45,140,255,.18);

transition:.35s;

}

.logo img:hover{

transform:scale(1.05);

box-shadow:

0 0 28px rgba(45,140,255,.55),

0 0 60px rgba(45,140,255,.30);

}

/* الوصف */

.desc{

color:#9ca3af;

font-size:19px;

margin-bottom:45px;

}

/* البنرات */

.banner{

display:block;

width:100%;

border-radius:22px;

overflow:hidden;

margin-bottom:35px;

box-shadow:0 0 20px rgba(0,132,255,.20);

transition:.35s;

}

.banner img{

display:block;

width:100%;

}

.banner:hover{

transform:translateY(-8px) scale(1.02);

box-shadow:0 0 35px rgba(0,132,255,.55);

}

/* الفوتر */

.footer{

margin-top:35px;

color:#7d8aa5;

font-size:15px;

}

.footer span{

color:#2d8cff;

font-weight:bold;

}

/* الجوال */

@media (max-width:768px){

body{

display:block;

padding:30px 15px;

background:#081321;

overflow-x:hidden;

}

.background{

display:none !important;

}

.particles{

display:none !important;

}

.side,

.left-character,

.right-character{

display:none !important;

}

.container{

max-width:100%;

}

.logo img{

width:90px;

height:90px;

box-shadow:none;

}

.desc{

font-size:17px;

margin-bottom:25px;

}

.banner{

border-radius:16px;

margin-bottom:20px;

box-shadow:none;

transform:none !important;

}

.banner:hover{

transform:none;

box-shadow:none;

}

.footer{

font-size:14px;

}

}

</style>

</head>

<body>

<div class="background"></div>

<div class="particles"></div>

<img src="ghost (2).webp" class="side left-character" alt="Ghost">

<img src="leon2.webp" class="side right-character" alt="Leon">

<div class="container">

    <div class="logo">
        <img src="logo.webp"
             fetchpriority="high"
             decoding="async"
             alt="MOVE Logo">
    </div>

    <div class="desc">
        اختر نوع حساب Steam
    </div>

    <a class="banner" href="https://salla.sa/movestore/steam-online/c25323818" target="_blank">
        <img src="online.webp"
             loading="lazy"
             decoding="async"
             alt="Steam Online">
    </a>

    <a class="banner" href="https://salla.sa/movestore/steam-offline/c758486836" target="_blank">
        <img src="offline.webp"
             loading="lazy"
             decoding="async"
             alt="Steam Offline">
    </a>

    <div class="footer">
        © 2026 <span>MOVE STORE</span><br>
        أفضل متجر للحسابات والألعاب الرقمية
    </div>

</div>

</body>
</html>
