<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOVE | Steam</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{

    background:
    radial-gradient(circle at top,#0f3b82 0%,transparent 30%),
    radial-gradient(circle at bottom,#081a35 0%,transparent 35%),
    linear-gradient(180deg,#050913,#091321,#0b1220);

    background-size:cover;
    background-attachment:fixed;

    color:#fff;

    display:flex;
    justify-content:center;

    padding:60px 20px;

    overflow-x:hidden;

    position:relative;

}

/* الخلفية */

.background{

    position:fixed;

    left:0;
    top:0;

    width:100%;
    height:100%;

    pointer-events:none;

    z-index:0;

    background:

    radial-gradient(circle at 20% 30%,
    rgba(0,140,255,.15),
    transparent 30%),

    radial-gradient(circle at 80% 30%,
    rgba(0,140,255,.15),
    transparent 30%),

    radial-gradient(circle at center,
    rgba(0,80,255,.08),
    transparent 55%);

    animation:bgMove 12s ease-in-out infinite;

}

@keyframes bgMove{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}
/* particles */
.particles{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
opacity:.35;
background-image:
radial-gradient(#1d8cff 1px,transparent 1px),
radial-gradient(#4db8ff 1px,transparent 1px);
background-size:180px 180px,260px 260px;
background-position:0 0,120px 80px;
animation:particlesMove 18s linear infinite;
}
@keyframes particlesMove{
from{transform:translateY(0)}
to{transform:translateY(-180px)}
}

/* side characters */
.side{
    position:fixed;
    bottom:0;
    pointer-events:none;
    z-index:1;
    opacity:.55;
    filter:
    drop-shadow(0 0 35px #008cff)
    drop-shadow(0 0 90px rgba(0,140,255,.55));
}
.side::after{
content:"";
position:absolute;
inset:-30px;
border-radius:50%;
background:radial-gradient(circle,rgba(0,140,255,.28),transparent 70%);
filter:blur(40px);
z-index:-1;
animation:glow 4s ease-in-out infinite;
}
@keyframes glow{
0%,100%{opacity:.3;transform:scale(.96)}
50%{opacity:.8;transform:scale(1.05)}
}
.left-character{
    position:fixed;
    left:-180px;
    bottom:-60px;
    height:100vh;
    width:auto;
    opacity:.55;
    z-index:1;
}

.right-character{
    position: fixed;
    right: -20px;   /* قربه من البنر */
bottom: -350px;
    height: 140vh;  /* نفس حجم Ghost تقريبًا */
    width: auto;
    opacity: .55;
    z-index: 1;
}
}
.background{

position:fixed;

left:0;
top:0;

width:100%;
height:100%;

z-index:0;

pointer-events:none;

background:

radial-gradient(circle at 20% 35%,rgba(0,140,255,.12),transparent 28%),

radial-gradient(circle at 80% 35%,rgba(0,140,255,.12),transparent 28%),

radial-gradient(circle at center,rgba(0,80,255,.08),transparent 55%);

animation:bgMove 12s ease-in-out infinite;

}

.container{

position:relative;

z-index:5;

width:100%;
max-width:900px;

text-align:center;

}

.logo{margin-bottom:20px;}
.logo img{
width:120px;height:120px;border-radius:50%;
display:block;margin:auto;
box-shadow:0 0 15px rgba(45,140,255,.35),0 0 35px rgba(45,140,255,.2);
transition:.35s;
}
.logo img:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(45,140,255,.6),0 0 50px rgba(45,140,255,.35);
}

.desc{color:#9ca3af;font-size:19px;margin-bottom:45px;}

.banner{
display:block;width:100%;
border-radius:22px;
overflow:hidden;
margin-bottom:35px;
box-shadow:0 0 20px rgba(0,132,255,.20);
transition:.35s;
}
.banner img{width:100%;display:block;}
.banner:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 0 35px rgba(0,132,255,.55);
}

.footer{
margin-top:35px;
color:#7d8aa5;
font-size:15px;
}
.footer span{color:#2d8cff;font-weight:bold;}

@media(max-width:768px){
body{padding:40px 15px;}
.logo img{width:90px;height:90px;}
.desc{font-size:17px;margin-bottom:30px;}
.banner{border-radius:18px;margin-bottom:22px;}
.footer{font-size:14px;}
.side,.particles{display:none;}
}
</style>
</head>
<body>

<div class="background"></div>

<div class="particles"></div>

<img src="ghost (2).png" class="side left-character" alt="Ghost">
<img src="leon2.png" class="side right-character" alt="Leon">

<div class="container">
<div class="logo">
<img src="logo.png" alt="MOVE Logo">
</div>

<div class="desc">اختر نوع حساب Steam</div>

<a class="banner" href="https://salla.sa/movestore/steam-online/c25323818" target="_blank">
<img src="online.png" alt="Steam Online">
</a>

<a class="banner" href="https://salla.sa/movestore/steam-offline/c758486836" target="_blank">
<img src="offline.png" alt="Steam Offline">
</a>

<div class="footer">
© 2026 <span>MOVE STORE</span><br>
أفضل متجر للحسابات والألعاب الرقمية
</div>
</div>
</body>
</html>
