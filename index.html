<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOVE | Steam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1220;
    background-image:radial-gradient(circle at top,#143b7d33 0%,transparent 40%);
    color:#fff;
    display:flex;
    justify-content:center;
    padding:60px 20px;
}

.container{
    width:100%;
    max-width:900px;
    text-align:center;
}

/* اللوقو */

.logo{
    margin-bottom:15px;
    font-size:62px;
    font-weight:900;
    line-height:1;
    letter-spacing:2px;
}

.logo .en{
    color:#ffffff;
}

.logo .line{
    color:#2d8cff;
    margin:0 10px;
}

.logo .ar{
    color:#2d8cff;
    font-size:64px;
    font-weight:900;
}

/* الوصف */

.desc{
    color:#9ca3af;
    font-size:19px;
    margin-bottom:45px;
}

/* البنرات */

.banner{
    display:block;
    width:100%;
    border-radius:22px;
    margin-bottom:35px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,132,255,.20);
    transition:.35s;
}

.banner img{
    width:100%;
    display:block;
}

.banner:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 0 35px rgba(0,132,255,.55);
}

/* الفوتر */

.footer{
    margin-top:35px;
    color:#7d8aa5;
    font-size:15px;
}

.footer span{
    color:#2d8cff;
    font-weight:bold;
}

/* الجوال */

@media (max-width:768px){

body{
    padding:40px 15px;
}

.logo{
    font-size:42px;
}

.logo .ar{
    font-size:30px;
}

.logo .line{
    margin:0 6px;
}

.desc{
    font-size:17px;
    margin-bottom:30px;
}

.banner{
    border-radius:18px;
    margin-bottom:22px;
}

.footer{
    font-size:14px;
}

}
</style>

</head>

<body>

<div class="container">

<div class="logo" dir="rtl">
    <span class="ar">موف</span>
    <span class="line">|</span>
    <span class="en">MOVE</span>
</div>

<div class="desc">
اختر نوع حساب Steam
</div>

<a class="banner" href="https://salla.sa/movestore/steam-online/c25323818" target="_blank">
<img src="online.png" alt="Steam Online">
</a>

<a class="banner" href="https://salla.sa/movestore/steam-offline/c758486836" target="_blank">
<img src="offline.png" alt="Steam Offline">
</a>

<div class="footer">
© 2026 <span>MOVE STORE</span><br>
أفضل متجر للحسابات والألعاب الرقمية
</div>

</div>

</body>
</html>
